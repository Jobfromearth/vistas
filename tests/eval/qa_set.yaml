# Curated QA set (plan §6 "检索正确性" — a first real installment, not the
# full 50-100-question target yet). Each entry's `chunk_id` is the ground
# truth: it's the real chunk the question was written FROM (reading actual
# ingested Migrationsverket/Riksdagen content), not independently verified
# against outside legal knowledge — correctness rests on trusting Vistas'
# own already-ingested official text, which is the right scope for this
# eval (it tests retrieval, not whether Migrationsverket's own text is
# accurate).
#
# `query` is the keyword string a calling agent is assumed to have already
# produced (per ADR-0003, translation is the caller's job, not Vistas').
# `question_en`/`question_zh` are the natural-language questions a real
# user might ask, kept for documentation/readability — they are NOT sent to
# search_rules directly; `query` is. This means the Chinese entries test
# "does retrieval work given a correct translation," not "can an LLM
# translate this correctly" — that needs a live model call and belongs in
# the separate, non-CI-gated end-to-end tier (plan §6, LLM-as-Judge row).
#
# `expect` is "hit" (chunk_id must appear in top-10 results) or "no_data"
# (search_rules must return no_data — plan §6's "无数据行为" dimension).

