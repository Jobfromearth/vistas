  note: |
    Regression note: an earlier version of this entry used chunk_id
    guid/.../prepare-this-before-you-apply/en with query "translate
    documents certified translation application" — that failed, not from a
    bug, but because 4 different guidance pages share near-identical
    "translate your documents" boilerplate under the same heading, so BM25
    can't uniquely disambiguate a generic query against duplicated content.
    Real finding, kept as a lesson: pick QA queries specific enough to
    distinguish real duplicate boilerplate across pages.

