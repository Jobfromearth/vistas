- id: qa-013
  area: entry_and_stay
  chunk_id: sfs-2005:716/2@2026-07-12/8 c/sv
  expect: hit
  question_en: Do Nordic citizens need a work permit to work in Sweden?
  question_zh: 北欧国家公民在瑞典工作需要工签吗？
  query: medborgare Danmark Finland Island Norge arbetstillstånd
  note: |
    Nordic citizens (DK/FI/IS/NO) exempt from work permit requirement.
    Regression note: an earlier version of this query added "undantag"
    (exemption) — a natural word for the English question's "exempt" but
    one that never literally appears in the statute text itself (Utl.
    2 kap. 8 c § phrases it as a plain list under "gäller inte", not the
    word "undantag") — and the pure-AND query design (ADR-0003) means one
    extra word not in the target broke the whole match, 0 hits. Real
    finding about lexical-AND fragility, kept as a lesson.

